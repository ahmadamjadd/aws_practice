version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing dependencies..."
      - pip install -r requirements.txt
  pre_build:
    commands:
      - echo "Running unit tests..."
      - pytest test_main.py
  build:
    commands:
      - echo "Build phase (Tests passed!). Preparing for deployment..."
  post_build:
    commands:
      - echo "Build completed on `date`"
artifacts:
  files:
    - '**/*'